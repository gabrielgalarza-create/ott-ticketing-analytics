name: Build & deploy dashboard

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:          # manual "Run workflow" button
  push:
    branches: [main]
    paths-ignore:
      - "README.md"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync data from SweatPals API
        env:
          SWEATPALS_API_KEY: ${{ secrets.SWEATPALS_API_KEY }}
          SWEATPALS_HOST: https://ilove.sweatpals.com
        run: python -m src.sync

      - name: Build static dashboard
        run: python -m src.build_static

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
